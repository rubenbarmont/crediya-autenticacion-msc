server:
  port: 8080

spring:
  application:
    name: "crediya-autenticacion-msc"

  devtools:
    add-properties: false

  h2:
    console:
      enabled: true
      path: "/h2"

  profiles:
    include: null
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080"

adapters:
  r2dbc:
    host: "localhost"
    port: 5432
    database: "autenticacion"
    schema: "public"
    username: "user"
    password: "password"


jwt:
  secret: "YTQ1M2Y4NTg2Zjc5MWI2YjYxNWI0ZDAxODkxZWU5MDIzMjI1Y2M2MzBlYjI4NGU4MGRjZmYxYjcwYjdlYjY5NQ=="
  expirationInMinutes: 1
